<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>404 – Sofia</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c5ce7;
      --primary-light: #a29bfe;
      --bg: #f9f9f9;
      --card: #ffffff;
      --fg: #333333;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #10B981;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --fg: #f8fafc;
        --muted: #cbd5e1;
        --border: #334155;
        --primary: #a29bfe;
        --primary-light: #6c5ce7;
      }
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .shell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: var(--bg);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .card {
      width: min(90vw, 360px);
      background: var(--card);
      border-radius: 32px;
      padding: 48px 36px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: 0 24px 64px rgba(108, 92, 231, 0.12), 0 4px 16px rgba(0,0,0,0.06);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
      margin-bottom: 24px;
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-6px); }
    }

    .code {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 260px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.93);
      box-shadow: 0 2px 8px rgba(108, 92, 231, 0.2);
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: 28px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a29bfe" />
            <stop offset="100%" stop-color="#6c5ce7" />
          </linearGradient>
        </defs>
        <rect width="120" height="120" rx="30" fill="url(#bg)" />
        <path d="M 80 40 C 80 20, 40 20, 40 40 C 40 60, 80 60, 80 80 C 80 100, 40 100, 40 80"
              stroke="white" stroke-width="12" fill="none" stroke-linecap="round" />
        <circle cx="40" cy="20" r="8" fill="#10B981" />
        <circle cx="80" cy="100" r="8" fill="#ffffff" />
      </svg>

      <div class="code">404</div>
      <div class="title">Page not found</div>
      <p class="desc">Looks like this page took a wrong turn. Let's get you back on track.</p>

      <a class="btn" href="/">
        ← Back to Sofia
      </a>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</body>
</html>
